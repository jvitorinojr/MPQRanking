<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="background-color" content="#0f0f23" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ranking MQP" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Ranking MQP" />
  <meta name="description" content="Ranking de Jogadores - Mais Que Perfeito. Controle de partidas e ranking acumulativo." />

  <title>Ranking MQP - Mais Que Perfeito</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

  <!-- Splash screen for iOS -->
  <style>
    html, body, #root {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0f0f23;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
    }
    /* Loading splash */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f23;
      z-index: 9999;
    }
    #splash h1 { color: #e94560; font-family: system-ui; font-size: 28px; margin: 0; }
    #splash p { color: #a0a0c0; font-family: system-ui; font-size: 14px; margin-top: 8px; }
    #splash .spinner {
      width: 40px; height: 40px; margin-top: 24px;
      border: 4px solid #2a2a4a; border-top-color: #e94560;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <h1>Mais Que Perfeito</h1>
    <p>Ranking de Jogadores</p>
    <div class="spinner"></div>
  </div>
  <div id="root"></div>

  <script>
    // Remove splash when app loads
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) splash.style.display = 'none';
      }, 1000);
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
